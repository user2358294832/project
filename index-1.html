    /* ─── CONFIG ──────────────────────────────────── */
    /* GitHub kullanıcı adını ve repo adını buraya yaz */
    /* const GITHUB_USER ve GITHUB_REPO aşağıda JS'de */

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --glass:       rgba(255,255,255,0.10);
      --glass-hover: rgba(255,255,255,0.17);
      --border:      rgba(255,255,255,0.20);
      --border-h:    rgba(255,255,255,0.35);
      --text:        rgba(255,255,255,0.90);
      --muted:       rgba(255,255,255,0.45);
      --faint:       rgba(255,255,255,0.22);
      --shadow:      rgba(0,0,0,0.30);
      --blur:        blur(26px) saturate(1.5) brightness(1.12);
      --r:           20px;
      --r-lg:        28px;
    }

    html, body {
      height: 100%;
      font-family: 'Jost', sans-serif;
      color: var(--text);
      overflow-x: hidden;
    }

    .bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        160deg,
        rgba(28,20,12,0.40) 0%,
        rgba(12,18,32,0.25) 100%
      );
    }

    /* ─── GRAIN ──────────────────────────────────── */
    .grain {
      position: fixed;
      inset: 0;
      z-index: 1;
      opacity: 0.032;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 180px;
    }

    /* ─── PAGE SHELL ─────────────────────────────── */
    .page {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: clamp(24px, 5vw, 60px) clamp(20px, 6vw, 72px);
      gap: clamp(28px, 4vh, 52px);
    }

    /* ─── HEADER ─────────────────────────────────── */
    .header {
      text-align: center;
      animation: fadeDown 0.7s cubic-bezier(0.22,1,0.36,1) both;
    }

    .header-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(22px, 5vw, 52px);
      font-weight: 700;
      letter-spacing: -0.01em;
      line-height: 1.15;
      color: rgba(255,255,255,0.94);
      text-shadow: 0 2px 24px rgba(0,0,0,0.35);
    }

    .header-sub {
      margin-top: 10px;
      font-size: clamp(11px, 1.6vw, 15px);
      font-weight: 200;
      letter-spacing: 0.30em;
      text-transform: uppercase;
      color: var(--faint);
    }

    /* ─── THIN DIVIDER ───────────────────────────── */
    .divider {
      width: clamp(40px, 8vw, 80px);
      height: 1px;
      background: var(--faint);
      margin: 14px auto 0;
      border-radius: 1px;
    }

    /* ─── MAIN CONTENT ───────────────────────────── */
    .content {
      flex: 1;
      display: flex;
      gap: clamp(20px, 4vw, 56px);
      align-items: flex-start;
      animation: fadeUp 0.75s 0.15s cubic-bezier(0.22,1,0.36,1) both;
    }

    /* ─── LEFT NAV ───────────────────────────────── */
    .left-nav {
      display: flex;
      flex-direction: column;
      gap: 14px;
      flex-shrink: 0;
    }

    .nav-btn {
      width: clamp(110px, 18vw, 150px);
      height: clamp(110px, 18vw, 150px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: var(--glass);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      cursor: pointer;
      text-decoration: none;
      color: var(--text);
      transition: background 0.28s, border-color 0.28s, transform 0.28s cubic-bezier(0.22,1,0.36,1), box-shadow 0.28s;
      position: relative;
      overflow: hidden;
    }

    /* Inner shimmer */
    .nav-btn::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -20%;
      width: 60%;
      height: 70%;
      background: radial-gradient(ellipse, rgba(255,255,255,0.09) 0%, transparent 70%);
      pointer-events: none;
    }

    .nav-btn:hover {
      background: var(--glass-hover);
      border-color: var(--border-h);
      transform: translateY(-4px) scale(1.02);
      box-shadow: 0 16px 48px rgba(0,0,0,0.28);
    }

    .nav-btn.active {
      background: rgba(255,255,255,0.16);
      border-color: rgba(255,255,255,0.38);
      box-shadow: 0 8px 32px rgba(0,0,0,0.22);
    }

    .nav-icon {
      font-size: clamp(22px, 3.5vw, 30px);
      line-height: 1;
    }

    .nav-label {
      font-size: clamp(10px, 1.4vw, 13px);
      font-weight: 400;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.75);
    }

    /* ─── RIGHT SECTION ──────────────────────────── */
    .right-section {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .section-heading {
      font-family: 'Playfair Display', serif;
      font-size: clamp(14px, 2.2vw, 20px);
      font-weight: 400;
      font-style: italic;
      color: var(--faint);
      letter-spacing: 0.04em;
    }

    /* ─── UPLOAD CARD ────────────────────────────── */
    .upload-card {
      background: var(--glass);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: clamp(20px, 3.5vw, 36px);
      display: flex;
      flex-direction: column;
      gap: 14px;
      text-decoration: none;
      color: var(--text);
      transition: background 0.28s, border-color 0.28s, transform 0.30s cubic-bezier(0.22,1,0.36,1), box-shadow 0.28s;
      position: relative;
      overflow: hidden;
    }

    .upload-card::before {
      content: '';
      position: absolute;
      top: -40%;
      right: -10%;
      width: 50%;
      height: 70%;
      background: radial-gradient(ellipse, rgba(255,255,255,0.06) 0%, transparent 70%);
      pointer-events: none;
    }

    .upload-card:hover {
      background: var(--glass-hover);
      border-color: var(--border-h);
      transform: translateY(-3px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.26);
    }

    .card-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--faint);
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      padding: 4px 12px;
      border-radius: 99px;
      width: fit-content;
    }

    .card-name {
      font-family: 'Playfair Display', serif;
      font-size: clamp(17px, 2.8vw, 26px);
      font-weight: 600;
      line-height: 1.3;
      color: rgba(255,255,255,0.92);
    }

    .card-link-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: clamp(11px, 1.4vw, 13px);
      font-weight: 300;
      color: var(--faint);
      letter-spacing: 0.06em;
    }

    .card-arrow {
      font-size: 18px;
      color: rgba(255,255,255,0.55);
      transition: transform 0.2s;
    }
    .upload-card:hover .card-arrow { transform: translateX(4px); }

    /* Empty state */
    .empty-state {
      background: var(--glass);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: clamp(32px, 6vw, 60px);
      text-align: center;
    }

    .empty-icon {
      font-size: clamp(28px, 4vw, 44px);
      opacity: 0.3;
      margin-bottom: 14px;
    }

    .empty-text {
      font-family: 'Playfair Display', serif;
      font-size: clamp(14px, 2vw, 18px);
      font-style: italic;
      color: var(--faint);
    }

    /* Loading pulse */
    .skeleton {
      background: linear-gradient(90deg,
        rgba(255,255,255,0.05) 25%,
        rgba(255,255,255,0.09) 50%,
        rgba(255,255,255,0.05) 75%
      );
      background-size: 200% 100%;
      animation: shimmer 1.6s infinite;
      border-radius: 8px;
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ─── ANIMATIONS ─────────────────────────────── */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── FOOTER ─────────────────────────────────── */
    .footer {
      text-align: center;
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.15);
      padding-bottom: 4px;
    }

    /* ─── MOBILE ─────────────────────────────────── */
    @media (max-width: 640px) {
      .content {
        flex-direction: column;
        gap: 24px;
      }

      .left-nav {
        flex-direction: row;
        width: 100%;
      }

      .nav-btn {
        flex: 1;
        width: auto;
        height: clamp(90px, 28vw, 130px);
      }

      .right-section { width: 100%; }
    }

    @media (max-width: 400px) {
      .header-title { font-size: 20px; }
      .nav-btn { height: 90px; }
      .nav-icon { font-size: 20px; }
      .nav-label { font-size: 9px; }
    }
  </style>
</head>
<body>

  <div class="bg"></div>
  <div class="grain"></div>

  <div class="page">

    <!-- HEADER -->
    <header class="header">
      <h1 class="header-title">Eğitim Teknolojileri<br>ve Materyal Tasarımı</h1>
      <div class="divider"></div>
      <p class="header-sub">Ders Portfolyosu</p>
    </header>

    <!-- MAIN CONTENT -->
    <main class="content">

      <!-- LEFT: Navigation squares -->
      <nav class="left-nav">
        <a href="index.html" class="nav-btn active">
          <span class="nav-icon">🏠</span>
          <span class="nav-label">Ana Sayfa</span>
        </a>
        <a href="uploads.html" class="nav-btn">
          <span class="nav-icon">📂</span>
          <span class="nav-label">Yüklemeler</span>
        </a>
      </nav>

      <!-- RIGHT: Latest upload -->
      <section class="right-section">
        <h2 class="section-heading">Son Yükleme</h2>
        <div id="latestContainer">
          <!-- Loading skeleton -->
          <div class="upload-card" style="pointer-events:none;">
            <div class="skeleton" style="height:22px;width:100px;border-radius:99px;"></div>
            <div class="skeleton" style="height:28px;width:70%;"></div>
            <div class="skeleton" style="height:14px;width:40%;"></div>
          </div>
        </div>
      </section>

    </main>

    <footer class="footer">Eğitim Teknolojileri ve Materyal Tasarımı &nbsp;·&nbsp; Ders Portfolyosu</footer>

  </div>

  <script>
    // ─── AYARLAR ──────────────────────────────────────────────────────────────
    // GitHub kullanıcı adın ve repository adını buraya yaz:
    const GITHUB_USER = 'KULLANICI_ADIN';
    const GITHUB_REPO = 'REPO_ADIN';
    // ─────────────────────────────────────────────────────────────────────────

    async function fetchLatest() {
      const container = document.getElementById('latestContainer');
      try {
        const res = await fetch(
          `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/uploads`,
          { headers: { 'Accept': 'application/vnd.github.v3+json' } }
        );

        if (!res.ok) throw new Error('fetch_failed');

        const files = await res.json();
        const htmlFiles = files
          .filter(f => f.type === 'file' && f.name.endsWith('.html'))
          .sort((a, b) => b.name.localeCompare(a.name)); // alfabetik tersten (en yeni en üstte)

        if (htmlFiles.length === 0) throw new Error('empty');

        const latest = htmlFiles[0];
        const displayName = latest.name
          .replace(/\.html$/, '')
          .replace(/[-_]/g, ' ')
          .replace(/\b\w/g, c => c.toUpperCase());

        container.innerHTML = `
          <a href="/uploads/${latest.name}" class="upload-card" target="_blank">
            <span class="card-badge">📄 HTML Dosyası</span>
            <div class="card-name">${displayName}</div>
            <div class="card-link-row">
              <span>Görüntülemek için tıkla</span>
              <span class="card-arrow">→</span>
            </div>
          </a>
        `;

      } catch (err) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📭</div>
            <p class="empty-text">Henüz yükleme yapılmadı.</p>
          </div>
        `;
      }
    }

    fetchLatest();
  </script>

</body>
</html>
